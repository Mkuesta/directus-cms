<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oncology Nurse Practitioners Email List - MedicoReach</title>
    <meta name="description" content="Learn how to build a targeted email list for oncology nurse practitioners." />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: "#008080", // Deep Teal
                        secondary: "#4CAF50", // Vibrant Green
                        "background-light": "#FFFFFF",
                        "background-dark": "#0f172a", // Slate 900
                        "surface-light": "#F0F9F9", // Soft Clinical Blue tint
                        "surface-dark": "#1e293b", // Slate 800
                        "accent-blue": "#E6F2F2", // Clinical Blue
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                    },
                    typography: (theme) => ({
                        DEFAULT: {
                            css: {
                                color: theme('colors.gray.600'),
                                h1: { color: theme('colors.gray.900') },
                                h2: { color: theme('colors.gray.900') },
                                h3: { color: theme('colors.gray.900') },
                                strong: { color: theme('colors.gray.900') },
                                'ul > li::marker': { color: theme('colors.primary') },
                            },
                        },
                        dark: {
                            css: {
                                color: theme('colors.gray.300'),
                                h1: { color: theme('colors.white') },
                                h2: { color: theme('colors.white') },
                                h3: { color: theme('colors.white') },
                                strong: { color: theme('colors.white') },
                                'ul > li::marker': { color: theme('colors.secondary') },
                            },
                        },
                    }),
                },
            },
        };
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent; 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        /* Material Symbols helper */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script type="importmap">

  }
}
</script>

</head>
<body class="font-sans text-gray-700 dark:text-gray-200 bg-background-light dark:bg-background-dark antialiased transition-colors duration-300">

<script type="module" src="/index.tsx"></script>
</body>
</html>
